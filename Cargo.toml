[package]
name = "iliad"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
aead = "0.5.2"
aes = "0.8.3"
aes-gcm = "0.10.3"
aes-gcm-siv = "0.11.1"
base64 = "0.21.4"
bcrypt = "0.15.0"
block-modes = "0.9.1"
block-padding = "0.3.3"
cbc = "0.1.2"
chacha20 = "0.9.1"
chrono = { version = "0.4.31", features = [ "serde" ] }
crc32fast = "1.3.2"
diesel = { version = "2.1", features = [ "sqlite", "chrono" ] }
dotenv = "0.15.0"
env_logger = "0.10.0"
flate2 = "1.0.27"
hex = "0.4.3"
log = "0.4"
openssl = "0.10.57"
orion = "0.17.6"
path_abs = "0.5.1"
pbkdf2 = "0.12.2"
rand = "0.8"
ring = "0.17.2"
rocket = "0.4.11"
rocket_codegen = "0.4.11"
rocket_contrib = "0.4.11"
rust-crypto = "0.2.36"
serde = { version = "1.0", features = [ "derive" ] }
serde_derive = "1.0.188"
serde_json = "1.0"
serde_yaml = "0.9"
sha2 = "0.10.8"
tar = "0.4.40"
walkdir = "2.4.0"
