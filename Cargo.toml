[package]
name = "iliad"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
chrono = { version = "0.4.31", features = [ "serde" ] }
clap = "4.4"
crc32fast = "1.3.2"
crc64fast = "1.0.0"
diesel = { version = "2.1", features = [ "sqlite", "chrono" ] }
diesel_migrations = "2.1"
dotenv = "0.15.0"
env_logger = "0.10.0"
flate2 = "1.0.27"
hex = "0.4.3"
log = "0.4"
path_abs = "0.5.1"
rand = "0.8"
ring = "0.17.2"
rocket = "0.4.11"
rocket_codegen = "0.4.11"
rocket_contrib = "0.4.11"
serde = { version = "1.0", features = [ "derive" ] }
serde_derive = "1.0.188"
serde_json = "1.0"
serde_yaml = "0.9"
tar = "0.4.40"
walkdir = "2.4.0"
